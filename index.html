<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Video Kit — Rotating Cutouts (draw · face · eyes)</title>
  <!-- p5.js latest (2.x) -->
  <script src="https://cdn.jsdelivr.net/npm/p5@2/lib/p5.min.js"></script>
  <!-- ml5.js 1.x (FaceMesh / MediaPipe) -->
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
/*
  Video Kit + Face Mesh.

  Free mode (default): drag to cut a rotating shape window. Each shape samples
  the composited layers beneath it, so stacked shapes nest recursively.

  Face mode (toolbar toggle): a shape drawn over a detected face ATTACHES to
  it. The shape's outline is anchored to the face-mesh triangulation via
  barycentric coordinates, so it follows, scales, and warps in perspective as
  the head moves and turns — "drawn on the face." The live video still spins
  inside the warped window (spin AND follow). Shapes drawn off a face stay
  free cutouts exactly as before.
*/

let capture;
let snap;                 // offscreen snapshot of the composite-so-far
let shapes = [];

let faceMesh;
let faces = [];           // latest ml5 results
let faceModelReady = false;
let meshTris = null;      // canonical face triangulation from ml5 (cached)

let currentTool = 'circle';   // 'square' | 'circle' | 'triangle'
let faceMode = false;
let eyeMode = false;          // auto flat rotating squares that follow open eyes
const eyeSpin = {};           // persistent spin state per face+eye, e.g. eyeSpin['L0']
let slitMode = false;         // radial slit-scan: video time radiates from shapes/eyes
let isDrawing = false;
let startX, startY, curX, curY;

const MIN_SIZE = 8;

// --- Eye mode tuning + FaceMesh eyelid landmark indices (canonical 468 mesh) ---
const EYE_SQUARE_SCALE = 1.7;   // square size as a multiple of eye corner-to-corner width
const EYE_SIZE_VARY    = 0.15;  // +/- random per-eye size variation (0.15 = ±15%)
const LEFT_EYE  = { outer: 263, inner: 362 };   // eye corner landmark indices (468 mesh)
const RIGHT_EYE = { outer: 33,  inner: 133 };

// --- Slit-scan (radial time-field) tuning ---
const SLIT_FRAMES = 100;  // number of time layers (rings) kept in the buffer
const SLIT_STEP   = 3;    // frames between captured layers (temporal spacing)
const SLIT_RING   = 5;    // px added to the disk radius per older time ring
const SLIT_RES    = 0.5;  // buffer resolution scale (lower = faster, softer)

// --- Toolbar layout (minimal, utilitarian) ---
const TB = { x: 16, y: 16, btn: 48, gap: 8 };
const TOOLS = ['square', 'circle', 'triangle', 'face', 'eyes', 'slit', 'clear'];
const SHAPE_TOOLS = ['square', 'circle', 'triangle'];

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  snap = createGraphics(windowWidth, windowHeight);
  snap.pixelDensity(1);
  angleMode(RADIANS);

  capture = createCapture(VIDEO);
  capture.hide();

  if (typeof ml5 !== 'undefined') {
    // Outside p5's preload, ml5.faceMesh() returns a PROMISE that resolves to
    // the detector. We mirror the video ourselves (see drawVideoCover), so we
    // let ml5 report unflipped coords and convert them in videoToScreen().
    ml5.faceMesh({ maxFaces: 5, refineLandmarks: false }).then((fm) => {
      faceMesh = fm;
      if (typeof fm.getTriangles === 'function') meshTris = fm.getTriangles();
      fm.detectStart(capture, (results) => {
        faces = results || [];
        faceModelReady = true;
      });
    });
  }
}

// Canonical 468-point face triangulation (index triples), cached on first use.
function meshTriangles() {
  if (!meshTris && faceMesh && typeof faceMesh.getTriangles === 'function') {
    meshTris = faceMesh.getTriangles();
  }
  return meshTris || [];
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  snap.resizeCanvas(windowWidth, windowHeight);
}

function draw() {
  background(0);
  if (!videoReady()) {
    drawWaiting();
    drawToolbar();
    return;
  }

  // Precompute each face's landmarks in screen space once per frame.
  for (const f of faces) f._screen = faceScreen(f);

  // 1. Base layer: live video, or the radial slit-scan time-field when on.
  if (slitMode) { updateSlitRing(); drawSlitBase(collectAnchors()); }
  else drawVideoCover();

  // 2. Advance spin for every shape.
  for (const s of shapes) s.angle += s.speed;

  // Draw free cutouts first, then face-attached shapes ON TOP. A free shape
  // re-rotates whatever is beneath it, so if it were drawn over a face shape
  // (e.g. a big circle AROUND the head) it would spin the face shapes the
  // wrong way. Keeping attached shapes last leaves them glued to the face
  // regardless of stacking order.
  for (const s of shapes) if (!s.attached) drawShapeCutout(s);
  for (const s of shapes) if (s.attached) drawAttachedShape(s);

  // 2b. Auto eye-squares: flat rotating cutouts that follow each open eye.
  if (eyeMode) drawEyeSquares();

  // 3. Drag preview.
  if (isDrawing) drawPreview();

  // 4. Face-mesh guide overlay (only in face mode).
  if (faceMode) drawFaceGuide();

  // 5. UI.
  drawToolbar();
  drawHint();
}

/* ---------------- video drawing ---------------- */

function videoReady() {
  return capture && capture.width > 0 && capture.height > 0;
}

function videoRect() {
  const vw = capture.width, vh = capture.height;
  const s = Math.max(width / vw, height / vh);
  const dw = vw * s, dh = vh * s;
  return { dx: (width - dw) / 2, dy: (height - dh) / 2, dw, dh, s };
}

function drawVideoCover() {
  const r = videoRect();
  push();
  translate(width, 0);
  scale(-1, 1); // selfie mirror
  image(capture, r.dx, r.dy, r.dw, r.dh);
  pop();
}

// Map a landmark (video pixels, unmirrored) to mirrored cover-fit screen space.
function videoToScreen(vx, vy) {
  const r = videoRect();
  return { x: width - r.dx - vx * r.s, y: r.dy + vy * r.s };
}

function faceScreen(f) {
  return f.keypoints.map(k => videoToScreen(k.x, k.y));
}

function faceCentroid(f) {
  const L = f._screen || faceScreen(f);
  let x = 0, y = 0;
  for (const p of L) { x += p.x; y += p.y; }
  return { x: x / L.length, y: y / L.length };
}

/* ---------------- free shapes (unchanged behavior) ---------------- */

function makeShape(type, x, y, w, h) {
  const bx = Math.min(x, x + w), by = Math.min(y, y + h);
  const bw = Math.abs(w), bh = Math.abs(h);
  const dir = Math.random() < 0.5 ? -1 : 1;
  return {
    type, x: bx, y: by, w: bw, h: bh,
    angle: 0,
    speed: dir * (0.004 + Math.random() * 0.016),
    attached: false,
    anchors: null,
    facePos: null,
    lastPoly: null
  };
}

function shapeCenter(s) {
  if (s.type === 'triangle') return { cx: s.x + s.w / 2, cy: s.y + (2 * s.h) / 3 };
  return { cx: s.x + s.w / 2, cy: s.y + s.h / 2 };
}

function tracePath(ctx, s) {
  ctx.beginPath();
  if (s.type === 'square') {
    ctx.rect(s.x, s.y, s.w, s.h);
  } else if (s.type === 'circle') {
    ctx.ellipse(s.x + s.w / 2, s.y + s.h / 2, s.w / 2, s.h / 2, 0, 0, Math.PI * 2);
  } else {
    ctx.moveTo(s.x + s.w / 2, s.y);
    ctx.lineTo(s.x + s.w, s.y + s.h);
    ctx.lineTo(s.x, s.y + s.h);
    ctx.closePath();
  }
}

function drawShapeCutout(s) {
  const { cx, cy } = shapeCenter(s);
  snap.clear();
  snap.drawingContext.drawImage(drawingContext.canvas, 0, 0, width, height);

  push();
  translate(cx, cy);
  rotate(s.angle);
  translate(-cx, -cy);

  tracePath(drawingContext, s);
  drawingContext.clip();
  image(snap, 0, 0, width, height);
  pop();
}

function drawOutline(s) {
  if (s.type === 'square') rect(s.x, s.y, s.w, s.h);
  else if (s.type === 'circle') ellipse(s.x + s.w / 2, s.y + s.h / 2, s.w, s.h);
  else triangle(s.x + s.w / 2, s.y, s.x + s.w, s.y + s.h, s.x, s.y + s.h);
}

function drawPreview() {
  const w = curX - startX, h = curY - startY;
  const p = makeShape(currentTool, startX, startY, w, h);
  noFill();
  stroke(faceMode ? color(0, 255, 200, 220) : color(255, 200));
  strokeWeight(1.5);
  drawingContext.setLineDash([6, 6]);
  drawOutline(p);
  drawingContext.setLineDash([]);
}

/* ---------------- face-attached shapes ---------------- */

// Sample a shape outline into a polygon (screen coords). Edges are subdivided
// so straight sides can bend with the face mesh.
function outlinePolygon(s) {
  const pts = [];
  if (s.type === 'circle') {
    const cx = s.x + s.w / 2, cy = s.y + s.h / 2, rx = s.w / 2, ry = s.h / 2, N = 48;
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2;
      pts.push({ x: cx + Math.cos(a) * rx, y: cy + Math.sin(a) * ry });
    }
  } else {
    const corners = (s.type === 'square')
      ? [{ x: s.x, y: s.y }, { x: s.x + s.w, y: s.y }, { x: s.x + s.w, y: s.y + s.h }, { x: s.x, y: s.y + s.h }]
      : [{ x: s.x + s.w / 2, y: s.y }, { x: s.x + s.w, y: s.y + s.h }, { x: s.x, y: s.y + s.h }];
    const N = 12;
    for (let c = 0; c < corners.length; c++) {
      const a = corners[c], b = corners[(c + 1) % corners.length];
      for (let i = 0; i < N; i++) {
        const t = i / N;
        pts.push({ x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t });
      }
    }
  }
  return pts;
}

// Barycentric coords of p in triangle (a,b,c): returns [wa, wb, wc] or null.
function bary(p, a, b, c) {
  const v0x = b.x - a.x, v0y = b.y - a.y;
  const v1x = c.x - a.x, v1y = c.y - a.y;
  const v2x = p.x - a.x, v2y = p.y - a.y;
  const d00 = v0x * v0x + v0y * v0y;
  const d01 = v0x * v1x + v0y * v1y;
  const d11 = v1x * v1x + v1y * v1y;
  const d20 = v2x * v0x + v2y * v0y;
  const d21 = v2x * v1x + v2y * v1y;
  const den = d00 * d11 - d01 * d01;
  if (Math.abs(den) < 1e-9) return null;
  const v = (d11 * d20 - d01 * d21) / den;
  const w = (d00 * d21 - d01 * d20) / den;
  return [1 - v - w, v, w];
}

// Anchor an outline point to a mesh triangle (containing one if possible,
// else nearest by centroid for points just outside the face).
function anchorPoint(p, L, tris) {
  let best = null, bestDist = Infinity;
  for (const t of tris) {
    const b = bary(p, L[t[0]], L[t[1]], L[t[2]]);
    if (!b) continue;
    if (b[0] >= -0.02 && b[1] >= -0.02 && b[2] >= -0.02) return { idx: t, w: b };
    const cx = (L[t[0]].x + L[t[1]].x + L[t[2]].x) / 3;
    const cy = (L[t[0]].y + L[t[1]].y + L[t[2]].y) / 3;
    const d = (cx - p.x) ** 2 + (cy - p.y) ** 2;
    if (d < bestDist) { bestDist = d; best = { idx: t, w: b }; }
  }
  return best || { idx: [0, 1, 2], w: [1, 0, 0] };
}

function attachShapeToFace(s, face) {
  const L = face._screen || faceScreen(face);
  const tris = meshTriangles();
  const poly = outlinePolygon(s);
  s.anchors = poly.map(p => anchorPoint(p, L, tris));
  s.attached = true;
  s.facePos = faceCentroid(face);
}

// Pick the face nearest the shape's last known position; update and return it.
function matchFace(s) {
  if (!faces.length) return null;
  let best = null, bd = Infinity;
  for (const f of faces) {
    const c = faceCentroid(f);
    const d = (c.x - s.facePos.x) ** 2 + (c.y - s.facePos.y) ** 2;
    if (d < bd) { bd = d; best = f; }
  }
  if (best) s.facePos = faceCentroid(best);
  return best;
}

function rebuildPolygon(s, L) {
  return s.anchors.map(an => {
    const a = L[an.idx[0]], b = L[an.idx[1]], c = L[an.idx[2]];
    return {
      x: an.w[0] * a.x + an.w[1] * b.x + an.w[2] * c.x,
      y: an.w[0] * a.y + an.w[1] * b.y + an.w[2] * c.y
    };
  });
}

function drawAttachedShape(s) {
  const face = matchFace(s);
  let poly;
  if (face) {
    poly = rebuildPolygon(s, face._screen);
    s.lastPoly = poly;
  } else if (s.lastPoly) {
    poly = s.lastPoly;          // face momentarily lost: freeze last position
  } else {
    return;
  }

  // Warped centroid (about which the inner video spins).
  let cx = 0, cy = 0;
  for (const p of poly) { cx += p.x; cy += p.y; }
  cx /= poly.length; cy /= poly.length;

  // Snapshot composite-below.
  snap.clear();
  snap.drawingContext.drawImage(drawingContext.canvas, 0, 0, width, height);

  push();
  // Clip to the warped, face-locked polygon (in screen space).
  drawingContext.beginPath();
  drawingContext.moveTo(poly[0].x, poly[0].y);
  for (let i = 1; i < poly.length; i++) drawingContext.lineTo(poly[i].x, poly[i].y);
  drawingContext.closePath();
  drawingContext.clip();

  // Spin the live composite inside the warped window.
  translate(cx, cy);
  rotate(s.angle);
  translate(-cx, -cy);
  image(snap, 0, 0, width, height);
  pop();
}

/* ---------------- auto eye-squares ---------------- */

// Named ptDist (not dist) to avoid clobbering p5's built-in dist().
function ptDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// For every detected face, draw a flat rotating square around each eye. The
// square follows the eye in screen space and spins like a normal cutout; it
// stays visible whether the eye is open or shut (blinks do not hide it).
function drawEyeSquares() {
  const eyes = [['L', LEFT_EYE], ['R', RIGHT_EYE]];
  for (let fi = 0; fi < faces.length; fi++) {
    const L = faces[fi]._screen || faceScreen(faces[fi]);
    for (const [side, e] of eyes) {
      const key = side + fi;
      let st = eyeSpin[key];
      if (!st) {
        const dir = Math.random() < 0.5 ? -1 : 1;
        const sizeMul = 1 + (Math.random() * 2 - 1) * EYE_SIZE_VARY;  // stable per-eye
        st = eyeSpin[key] = { angle: 0, speed: dir * (0.004 + Math.random() * 0.016), sizeMul };
      }
      st.angle += st.speed;
      if (!L[e.outer] || !L[e.inner]) continue;   // landmarks missing this frame

      const cx = (L[e.outer].x + L[e.inner].x) / 2;
      const cy = (L[e.outer].y + L[e.inner].y) / 2;
      const w = ptDist(L[e.outer], L[e.inner]) * EYE_SQUARE_SCALE * st.sizeMul;
      drawShapeCutout({ type: 'square', x: cx - w / 2, y: cy - w / 2, w, h: w, angle: st.angle });
    }
  }
}

/* ---------------- slit-scan: radial time-field ---------------- */

// A ring of recent video frames (downscaled). Reconstructed each frame so that
// pixels near an anchor (a shape / eye center) show the newest frame and pixels
// farther out show progressively older frames — time radiates outward.
let slitRing = null, slitHead = 0, slitCount = 0;

function ensureSlitBuffers() {
  const w = Math.max(2, Math.round(width * SLIT_RES));
  const h = Math.max(2, Math.round(height * SLIT_RES));
  if (slitRing && slitRing[0].width === w && slitRing[0].height === h) return;
  slitRing = [];
  for (let i = 0; i < SLIT_FRAMES; i++) {
    const g = createGraphics(w, h);
    g.pixelDensity(1);
    slitRing.push(g);
  }
  slitHead = 0; slitCount = 0;
}

// Mirror + cover-fit the current camera frame into a (downscaled) buffer.
function drawCoverInto(g) {
  const vw = capture.width, vh = capture.height;
  const s = Math.max(g.width / vw, g.height / vh);
  const dw = vw * s, dh = vh * s, dx = (g.width - dw) / 2, dy = (g.height - dh) / 2;
  g.push();
  g.clear();
  g.translate(g.width, 0);
  g.scale(-1, 1);          // selfie mirror, same as drawVideoCover
  g.image(capture, dx, dy, dw, dh);
  g.pop();
}

// Capture a new frame into the ring every SLIT_STEP frames (temporal spacing).
function updateSlitRing() {
  ensureSlitBuffers();
  if (frameCount % SLIT_STEP !== 0) return;
  slitHead = (slitHead + 1) % SLIT_FRAMES;
  drawCoverInto(slitRing[slitHead]);
  slitCount = Math.min(SLIT_FRAMES, slitCount + 1);
}

// age 0 = newest stored frame; age k = k captures (k*SLIT_STEP frames) older.
function ringFrame(k) {
  if (k >= slitCount) k = slitCount - 1;
  if (k < 0) return null;
  return slitRing[(slitHead - k + SLIT_FRAMES) % SLIT_FRAMES];
}

// Clip the canvas to the UNION of equal-radius disks around every anchor.
function clipToDisks(ctx, anchors, radius) {
  ctx.beginPath();
  for (const a of anchors) {
    ctx.moveTo(a.x + radius, a.y);
    ctx.arc(a.x, a.y, radius, 0, Math.PI * 2);
  }
  ctx.clip();
}

// Anchors = centers of all shapes (+ both eyes per face when eye mode is on).
function collectAnchors() {
  const a = [];
  for (const s of shapes) {
    if (s.attached) {
      if (s.lastPoly && s.lastPoly.length) {
        let cx = 0, cy = 0;
        for (const p of s.lastPoly) { cx += p.x; cy += p.y; }
        a.push({ x: cx / s.lastPoly.length, y: cy / s.lastPoly.length });
      } else if (s.facePos) {
        a.push({ x: s.facePos.x, y: s.facePos.y });
      }
    } else {
      const c = shapeCenter(s);
      a.push({ x: c.cx, y: c.cy });
    }
  }
  if (eyeMode) {
    for (const f of faces) {
      const L = f._screen || faceScreen(f);
      for (const e of [LEFT_EYE, RIGHT_EYE]) {
        if (L[e.outer] && L[e.inner]) {
          a.push({ x: (L[e.outer].x + L[e.inner].x) / 2, y: (L[e.outer].y + L[e.inner].y) / 2 });
        }
      }
    }
  }
  return a;
}

// Draw the radial time-field. Oldest frame fills the screen; progressively
// newer frames are stacked on top within growing disks around the anchors, so
// each ring outward from an anchor steps one capture further back in time.
function drawSlitBase(anchors) {
  if (slitCount === 0) { drawVideoCover(); return; }
  if (!anchors.length) { image(ringFrame(0), 0, 0, width, height); return; }
  image(ringFrame(slitCount - 1), 0, 0, width, height);   // oldest = background
  for (let k = slitCount - 2; k >= 0; k--) {
    push();
    clipToDisks(drawingContext, anchors, (k + 1) * SLIT_RING);
    image(ringFrame(k), 0, 0, width, height);
    pop();
  }
}

/* ---------------- face detection helpers ---------------- */

// True if point p lies inside any triangle of the face mesh.
function pointInMesh(p, L, tris) {
  for (const t of tris) {
    const b = bary(p, L[t[0]], L[t[1]], L[t[2]]);
    if (b && b[0] >= -0.001 && b[1] >= -0.001 && b[2] >= -0.001) return true;
  }
  return false;
}

// A shape attaches only if at least one of its outline points actually lands
// ON the face mesh — so a big shape drawn AROUND the head does not attach.
function faceTouchedByOutline(s) {
  const tris = meshTriangles();
  if (!tris.length) return null;
  const poly = outlinePolygon(s);
  for (const f of faces) {
    const L = f._screen || faceScreen(f);
    for (const p of poly) {
      if (pointInMesh(p, L, tris)) return f;
    }
  }
  return null;
}

function drawFaceGuide() {
  noStroke();
  for (const f of faces) {
    const L = f._screen || faceScreen(f);
    fill(0, 255, 200, 70);
    for (let i = 0; i < L.length; i += 3) circle(L[i].x, L[i].y, 2);
  }
}

/* ---------------- toolbar ---------------- */

function toolButtonRect(i) {
  return { x: TB.x, y: TB.y + i * (TB.btn + TB.gap), w: TB.btn, h: TB.btn };
}

function pointInToolbar(mx, my) {
  for (let i = 0; i < TOOLS.length; i++) {
    const b = toolButtonRect(i);
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) return i;
  }
  return -1;
}

function drawToolbar() {
  textAlign(CENTER, CENTER);
  for (let i = 0; i < TOOLS.length; i++) {
    const t = TOOLS[i];
    const b = toolButtonRect(i);
    const active = (t === currentTool) || (t === 'face' && faceMode) || (t === 'eyes' && eyeMode) || (t === 'slit' && slitMode);

    noStroke();
    if ((t === 'face' && faceMode) || (t === 'eyes' && eyeMode) || (t === 'slit' && slitMode)) fill(0, 255, 200, 235);
    else fill(0, 0, 0, active ? 235 : 150);
    if (t !== 'face' && t !== 'eyes' && t !== 'slit' && active) fill(255, 235);
    rect(b.x, b.y, b.w, b.h, 4);

    stroke(255, active ? 0 : 90);
    strokeWeight(1);
    noFill();
    rect(b.x, b.y, b.w, b.h, 4);

    const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
    const ic = active ? color(0) : color(255);
    stroke(ic); strokeWeight(2); noFill();
    const r = 11;
    if (t === 'square') {
      rectMode(CENTER); rect(cx, cy, r * 2, r * 2, 2); rectMode(CORNER);
    } else if (t === 'circle') {
      ellipse(cx, cy, r * 2, r * 2);
    } else if (t === 'triangle') {
      triangle(cx, cy - r, cx + r, cy + r, cx - r, cy + r);
    } else if (t === 'face') {
      ellipse(cx, cy, r * 2, r * 2.2);
      strokeWeight(2.5);
      point(cx - 4, cy - 3); point(cx + 4, cy - 3);
      strokeWeight(2); noFill();
      arc(cx, cy + 2, 10, 8, 0.15 * Math.PI, 0.85 * Math.PI);
    } else if (t === 'eyes') {
      rectMode(CENTER); noFill(); rect(cx, cy, r * 2, r * 1.5, 2); rectMode(CORNER);
      strokeWeight(2.5); point(cx, cy);          // pupil inside a little frame
    } else if (t === 'slit') {
      noFill();                                  // concentric time rings
      ellipse(cx, cy, r * 2, r * 2);
      ellipse(cx, cy, r * 1.15, r * 1.15);
      strokeWeight(2.5); point(cx, cy);
    } else { // clear
      line(cx - r, cy - r, cx + r, cy + r);
      line(cx + r, cy - r, cx - r, cy + r);
    }
  }
}

function drawHint() {
  noStroke();
  fill(255, 175);
  textSize(13);
  textAlign(LEFT, BOTTOM);
  let status;
  const fs = faceModelReady ? (faces.length + ' face' + (faces.length === 1 ? '' : 's')) : 'loading model…';
  if (slitMode) {
    status = 'SLIT — video time radiates from each shape / eye (live near them, delayed farther out).  Detected: ' + fs;
  } else if (eyeMode) {
    status = 'EYE MODE — a flat square spins around each eye and follows it.  Detected: ' + fs;
  } else if (faceMode) {
    status = 'FACE MODE — draw over a face to stick a warping cutout on it.  Detected: ' + fs;
  } else {
    status = 'Pick a shape, then drag to cut a rotating window.  Toggle face / eyes / slit for auto modes.';
  }
  text(status + '   Shapes: ' + shapes.length, TB.x, height - 14);
}

function drawWaiting() {
  noStroke(); fill(255); textSize(16); textAlign(CENTER, CENTER);
  text('Allow camera access…', width / 2, height / 2);
}

/* ---------------- input ---------------- */

function mousePressed() {
  const hit = pointInToolbar(mouseX, mouseY);
  if (hit !== -1) {
    const t = TOOLS[hit];
    if (t === 'clear') shapes = [];
    else if (t === 'face') faceMode = !faceMode;
    else if (t === 'eyes') eyeMode = !eyeMode;
    else if (t === 'slit') slitMode = !slitMode;
    else currentTool = t;
    return false;
  }
  isDrawing = true;
  startX = curX = mouseX;
  startY = curY = mouseY;
  return false;
}

function mouseDragged() {
  if (isDrawing) { curX = mouseX; curY = mouseY; }
  return false;
}

function mouseReleased() {
  if (!isDrawing) return false;
  isDrawing = false;
  const w = curX - startX, h = curY - startY;
  if (Math.abs(w) < MIN_SIZE || Math.abs(h) < MIN_SIZE) return false;

  const s = makeShape(currentTool, startX, startY, w, h);
  if (faceMode) {
    const f = faceTouchedByOutline(s);
    if (f) attachShapeToFace(s, f);
  }
  shapes.push(s);
  return false;
}

function touchStarted() { return mousePressed(); }
function touchMoved()   { return mouseDragged(); }
function touchEnded()   { return mouseReleased(); }

function keyPressed() {
  if (key === '1') currentTool = 'square';
  else if (key === '2') currentTool = 'circle';
  else if (key === '3') currentTool = 'triangle';
  else if (key === 'f' || key === 'F') faceMode = !faceMode;
  else if (key === 'e' || key === 'E') eyeMode = !eyeMode;
  else if (key === 't' || key === 'T') slitMode = !slitMode;
  else if (key === 'c' || key === 'C') shapes = [];
  else if (key === 'z' || key === 'Z') shapes.pop();
}
</script>
