<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Video Kit — Face-Mapped Rotating Cutouts</title>
  <!-- p5.js latest (2.x) -->
  <script src="https://cdn.jsdelivr.net/npm/p5@2/lib/p5.min.js"></script>
  <!-- ml5.js 1.x (FaceMesh / MediaPipe) -->
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
/*
  Video Kit + Face Mesh.

  Free mode (default): drag to cut a rotating shape window. Each shape samples
  the composited layers beneath it, so stacked shapes nest recursively.

  Face mode (toolbar toggle): a shape drawn over a detected face ATTACHES to
  it. The shape's outline is anchored to the face-mesh triangulation via
  barycentric coordinates, so it follows, scales, and warps in perspective as
  the head moves and turns — "drawn on the face." The live video still spins
  inside the warped window (spin AND follow). Shapes drawn off a face stay
  free cutouts exactly as before.
*/

let capture;
let snap;                 // offscreen snapshot of the composite-so-far
let shapes = [];

let faceMesh;
let faces = [];           // latest ml5 results
let faceModelReady = false;
let meshTris = null;      // canonical face triangulation from ml5 (cached)

let currentTool = 'circle';   // 'square' | 'circle' | 'triangle'
let faceMode = false;
let isDrawing = false;
let startX, startY, curX, curY;

const MIN_SIZE = 8;

// --- Toolbar layout (minimal, utilitarian) ---
const TB = { x: 16, y: 16, btn: 48, gap: 8 };
const TOOLS = ['square', 'circle', 'triangle', 'face', 'clear'];
const SHAPE_TOOLS = ['square', 'circle', 'triangle'];

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  snap = createGraphics(windowWidth, windowHeight);
  snap.pixelDensity(1);
  angleMode(RADIANS);

  capture = createCapture(VIDEO);
  capture.hide();

  if (typeof ml5 !== 'undefined') {
    // Outside p5's preload, ml5.faceMesh() returns a PROMISE that resolves to
    // the detector. We mirror the video ourselves (see drawVideoCover), so we
    // let ml5 report unflipped coords and convert them in videoToScreen().
    ml5.faceMesh({ maxFaces: 5, refineLandmarks: false }).then((fm) => {
      faceMesh = fm;
      if (typeof fm.getTriangles === 'function') meshTris = fm.getTriangles();
      fm.detectStart(capture, (results) => {
        faces = results || [];
        faceModelReady = true;
      });
    });
  }
}

// Canonical 468-point face triangulation (index triples), cached on first use.
function meshTriangles() {
  if (!meshTris && faceMesh && typeof faceMesh.getTriangles === 'function') {
    meshTris = faceMesh.getTriangles();
  }
  return meshTris || [];
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  snap.resizeCanvas(windowWidth, windowHeight);
}

function draw() {
  background(0);
  if (!videoReady()) {
    drawWaiting();
    drawToolbar();
    return;
  }

  // Precompute each face's landmarks in screen space once per frame.
  for (const f of faces) f._screen = faceScreen(f);

  // 1. Base live video.
  drawVideoCover();

  // 2. Shapes, in creation order.
  for (const s of shapes) {
    s.angle += s.speed;
    if (s.attached) drawAttachedShape(s);
    else drawShapeCutout(s);
  }

  // 3. Drag preview.
  if (isDrawing) drawPreview();

  // 4. Face-mesh guide overlay (only in face mode).
  if (faceMode) drawFaceGuide();

  // 5. UI.
  drawToolbar();
  drawHint();
}

/* ---------------- video drawing ---------------- */

function videoReady() {
  return capture && capture.width > 0 && capture.height > 0;
}

function videoRect() {
  const vw = capture.width, vh = capture.height;
  const s = Math.max(width / vw, height / vh);
  const dw = vw * s, dh = vh * s;
  return { dx: (width - dw) / 2, dy: (height - dh) / 2, dw, dh, s };
}

function drawVideoCover() {
  const r = videoRect();
  push();
  translate(width, 0);
  scale(-1, 1); // selfie mirror
  image(capture, r.dx, r.dy, r.dw, r.dh);
  pop();
}

// Map a landmark (video pixels, unmirrored) to mirrored cover-fit screen space.
function videoToScreen(vx, vy) {
  const r = videoRect();
  return { x: width - r.dx - vx * r.s, y: r.dy + vy * r.s };
}

function faceScreen(f) {
  return f.keypoints.map(k => videoToScreen(k.x, k.y));
}

function faceCentroid(f) {
  const L = f._screen || faceScreen(f);
  let x = 0, y = 0;
  for (const p of L) { x += p.x; y += p.y; }
  return { x: x / L.length, y: y / L.length };
}

/* ---------------- free shapes (unchanged behavior) ---------------- */

function makeShape(type, x, y, w, h) {
  const bx = Math.min(x, x + w), by = Math.min(y, y + h);
  const bw = Math.abs(w), bh = Math.abs(h);
  const dir = Math.random() < 0.5 ? -1 : 1;
  return {
    type, x: bx, y: by, w: bw, h: bh,
    angle: 0,
    speed: dir * (0.004 + Math.random() * 0.016),
    attached: false,
    anchors: null,
    facePos: null,
    lastPoly: null
  };
}

function shapeCenter(s) {
  if (s.type === 'triangle') return { cx: s.x + s.w / 2, cy: s.y + (2 * s.h) / 3 };
  return { cx: s.x + s.w / 2, cy: s.y + s.h / 2 };
}

function tracePath(ctx, s) {
  ctx.beginPath();
  if (s.type === 'square') {
    ctx.rect(s.x, s.y, s.w, s.h);
  } else if (s.type === 'circle') {
    ctx.ellipse(s.x + s.w / 2, s.y + s.h / 2, s.w / 2, s.h / 2, 0, 0, Math.PI * 2);
  } else {
    ctx.moveTo(s.x + s.w / 2, s.y);
    ctx.lineTo(s.x + s.w, s.y + s.h);
    ctx.lineTo(s.x, s.y + s.h);
    ctx.closePath();
  }
}

function drawShapeCutout(s) {
  const { cx, cy } = shapeCenter(s);
  snap.clear();
  snap.drawingContext.drawImage(drawingContext.canvas, 0, 0, width, height);

  push();
  translate(cx, cy);
  rotate(s.angle);
  translate(-cx, -cy);

  tracePath(drawingContext, s);
  drawingContext.clip();
  image(snap, 0, 0, width, height);

  noFill();
  stroke(255, 235);
  strokeWeight(1.5);
  drawOutline(s);
  pop();
}

function drawOutline(s) {
  if (s.type === 'square') rect(s.x, s.y, s.w, s.h);
  else if (s.type === 'circle') ellipse(s.x + s.w / 2, s.y + s.h / 2, s.w, s.h);
  else triangle(s.x + s.w / 2, s.y, s.x + s.w, s.y + s.h, s.x, s.y + s.h);
}

function drawPreview() {
  const w = curX - startX, h = curY - startY;
  const p = makeShape(currentTool, startX, startY, w, h);
  noFill();
  stroke(faceMode ? color(0, 255, 200, 220) : color(255, 200));
  strokeWeight(1.5);
  drawingContext.setLineDash([6, 6]);
  drawOutline(p);
  drawingContext.setLineDash([]);
}

/* ---------------- face-attached shapes ---------------- */

// Sample a shape outline into a polygon (screen coords). Edges are subdivided
// so straight sides can bend with the face mesh.
function outlinePolygon(s) {
  const pts = [];
  if (s.type === 'circle') {
    const cx = s.x + s.w / 2, cy = s.y + s.h / 2, rx = s.w / 2, ry = s.h / 2, N = 48;
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2;
      pts.push({ x: cx + Math.cos(a) * rx, y: cy + Math.sin(a) * ry });
    }
  } else {
    const corners = (s.type === 'square')
      ? [{ x: s.x, y: s.y }, { x: s.x + s.w, y: s.y }, { x: s.x + s.w, y: s.y + s.h }, { x: s.x, y: s.y + s.h }]
      : [{ x: s.x + s.w / 2, y: s.y }, { x: s.x + s.w, y: s.y + s.h }, { x: s.x, y: s.y + s.h }];
    const N = 12;
    for (let c = 0; c < corners.length; c++) {
      const a = corners[c], b = corners[(c + 1) % corners.length];
      for (let i = 0; i < N; i++) {
        const t = i / N;
        pts.push({ x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t });
      }
    }
  }
  return pts;
}

// Barycentric coords of p in triangle (a,b,c): returns [wa, wb, wc] or null.
function bary(p, a, b, c) {
  const v0x = b.x - a.x, v0y = b.y - a.y;
  const v1x = c.x - a.x, v1y = c.y - a.y;
  const v2x = p.x - a.x, v2y = p.y - a.y;
  const d00 = v0x * v0x + v0y * v0y;
  const d01 = v0x * v1x + v0y * v1y;
  const d11 = v1x * v1x + v1y * v1y;
  const d20 = v2x * v0x + v2y * v0y;
  const d21 = v2x * v1x + v2y * v1y;
  const den = d00 * d11 - d01 * d01;
  if (Math.abs(den) < 1e-9) return null;
  const v = (d11 * d20 - d01 * d21) / den;
  const w = (d00 * d21 - d01 * d20) / den;
  return [1 - v - w, v, w];
}

// Anchor an outline point to a mesh triangle (containing one if possible,
// else nearest by centroid for points just outside the face).
function anchorPoint(p, L, tris) {
  let best = null, bestDist = Infinity;
  for (const t of tris) {
    const b = bary(p, L[t[0]], L[t[1]], L[t[2]]);
    if (!b) continue;
    if (b[0] >= -0.02 && b[1] >= -0.02 && b[2] >= -0.02) return { idx: t, w: b };
    const cx = (L[t[0]].x + L[t[1]].x + L[t[2]].x) / 3;
    const cy = (L[t[0]].y + L[t[1]].y + L[t[2]].y) / 3;
    const d = (cx - p.x) ** 2 + (cy - p.y) ** 2;
    if (d < bestDist) { bestDist = d; best = { idx: t, w: b }; }
  }
  return best || { idx: [0, 1, 2], w: [1, 0, 0] };
}

function attachShapeToFace(s, face) {
  const L = face._screen || faceScreen(face);
  const tris = meshTriangles();
  const poly = outlinePolygon(s);
  s.anchors = poly.map(p => anchorPoint(p, L, tris));
  s.attached = true;
  s.facePos = faceCentroid(face);
}

// Pick the face nearest the shape's last known position; update and return it.
function matchFace(s) {
  if (!faces.length) return null;
  let best = null, bd = Infinity;
  for (const f of faces) {
    const c = faceCentroid(f);
    const d = (c.x - s.facePos.x) ** 2 + (c.y - s.facePos.y) ** 2;
    if (d < bd) { bd = d; best = f; }
  }
  if (best) s.facePos = faceCentroid(best);
  return best;
}

function rebuildPolygon(s, L) {
  return s.anchors.map(an => {
    const a = L[an.idx[0]], b = L[an.idx[1]], c = L[an.idx[2]];
    return {
      x: an.w[0] * a.x + an.w[1] * b.x + an.w[2] * c.x,
      y: an.w[0] * a.y + an.w[1] * b.y + an.w[2] * c.y
    };
  });
}

function drawAttachedShape(s) {
  const face = matchFace(s);
  let poly;
  if (face) {
    poly = rebuildPolygon(s, face._screen);
    s.lastPoly = poly;
  } else if (s.lastPoly) {
    poly = s.lastPoly;          // face momentarily lost: freeze last position
  } else {
    return;
  }

  // Warped centroid (about which the inner video spins).
  let cx = 0, cy = 0;
  for (const p of poly) { cx += p.x; cy += p.y; }
  cx /= poly.length; cy /= poly.length;

  // Snapshot composite-below.
  snap.clear();
  snap.drawingContext.drawImage(drawingContext.canvas, 0, 0, width, height);

  push();
  // Clip to the warped, face-locked polygon (in screen space).
  drawingContext.beginPath();
  drawingContext.moveTo(poly[0].x, poly[0].y);
  for (let i = 1; i < poly.length; i++) drawingContext.lineTo(poly[i].x, poly[i].y);
  drawingContext.closePath();
  drawingContext.clip();

  // Spin the live composite inside the warped window.
  translate(cx, cy);
  rotate(s.angle);
  translate(-cx, -cy);
  image(snap, 0, 0, width, height);
  pop();

  // Warped outline (follows the face; not spun).
  noFill();
  stroke(0, 255, 200, 235);
  strokeWeight(1.5);
  beginShape();
  for (const p of poly) vertex(p.x, p.y);
  endShape(CLOSE);
}

/* ---------------- face detection helpers ---------------- */

function faceUnderPoint(x, y) {
  let best = null, bd = Infinity;
  for (const f of faces) {
    const L = f._screen || faceScreen(f);
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of L) {
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    }
    if (x >= minX && x <= maxX && y >= minY && y <= maxY) {
      const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
      const d = (cx - x) ** 2 + (cy - y) ** 2;
      if (d < bd) { bd = d; best = f; }
    }
  }
  return best;
}

function drawFaceGuide() {
  noStroke();
  for (const f of faces) {
    const L = f._screen || faceScreen(f);
    fill(0, 255, 200, 70);
    for (let i = 0; i < L.length; i += 3) circle(L[i].x, L[i].y, 2);
  }
}

/* ---------------- toolbar ---------------- */

function toolButtonRect(i) {
  return { x: TB.x, y: TB.y + i * (TB.btn + TB.gap), w: TB.btn, h: TB.btn };
}

function pointInToolbar(mx, my) {
  for (let i = 0; i < TOOLS.length; i++) {
    const b = toolButtonRect(i);
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) return i;
  }
  return -1;
}

function drawToolbar() {
  textAlign(CENTER, CENTER);
  for (let i = 0; i < TOOLS.length; i++) {
    const t = TOOLS[i];
    const b = toolButtonRect(i);
    const active = (t === currentTool) || (t === 'face' && faceMode);

    noStroke();
    if (t === 'face' && faceMode) fill(0, 255, 200, 235);
    else fill(0, 0, 0, active ? 235 : 150);
    if (t !== 'face' && active) fill(255, 235);
    rect(b.x, b.y, b.w, b.h, 4);

    stroke(255, active ? 0 : 90);
    strokeWeight(1);
    noFill();
    rect(b.x, b.y, b.w, b.h, 4);

    const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
    const ic = active ? color(0) : color(255);
    stroke(ic); strokeWeight(2); noFill();
    const r = 11;
    if (t === 'square') {
      rectMode(CENTER); rect(cx, cy, r * 2, r * 2, 2); rectMode(CORNER);
    } else if (t === 'circle') {
      ellipse(cx, cy, r * 2, r * 2);
    } else if (t === 'triangle') {
      triangle(cx, cy - r, cx + r, cy + r, cx - r, cy + r);
    } else if (t === 'face') {
      ellipse(cx, cy, r * 2, r * 2.2);
      strokeWeight(2.5);
      point(cx - 4, cy - 3); point(cx + 4, cy - 3);
      strokeWeight(2); noFill();
      arc(cx, cy + 2, 10, 8, 0.15 * Math.PI, 0.85 * Math.PI);
    } else { // clear
      line(cx - r, cy - r, cx + r, cy + r);
      line(cx + r, cy - r, cx - r, cy + r);
    }
  }
}

function drawHint() {
  noStroke();
  fill(255, 175);
  textSize(13);
  textAlign(LEFT, BOTTOM);
  let status;
  if (faceMode) {
    const fs = faceModelReady ? (faces.length + ' face' + (faces.length === 1 ? '' : 's')) : 'loading model…';
    status = 'FACE MODE — draw over a face to stick a warping cutout on it.  Detected: ' + fs;
  } else {
    status = 'Pick a shape, then drag to cut a rotating window.  Toggle the face button to map shapes to faces.';
  }
  text(status + '   Shapes: ' + shapes.length, TB.x, height - 14);
}

function drawWaiting() {
  noStroke(); fill(255); textSize(16); textAlign(CENTER, CENTER);
  text('Allow camera access…', width / 2, height / 2);
}

/* ---------------- input ---------------- */

function mousePressed() {
  const hit = pointInToolbar(mouseX, mouseY);
  if (hit !== -1) {
    const t = TOOLS[hit];
    if (t === 'clear') shapes = [];
    else if (t === 'face') faceMode = !faceMode;
    else currentTool = t;
    return false;
  }
  isDrawing = true;
  startX = curX = mouseX;
  startY = curY = mouseY;
  return false;
}

function mouseDragged() {
  if (isDrawing) { curX = mouseX; curY = mouseY; }
  return false;
}

function mouseReleased() {
  if (!isDrawing) return false;
  isDrawing = false;
  const w = curX - startX, h = curY - startY;
  if (Math.abs(w) < MIN_SIZE || Math.abs(h) < MIN_SIZE) return false;

  const s = makeShape(currentTool, startX, startY, w, h);
  if (faceMode) {
    const c = shapeCenter(s);
    const f = faceUnderPoint(c.cx, c.cy);
    if (f) attachShapeToFace(s, f);
  }
  shapes.push(s);
  return false;
}

function touchStarted() { return mousePressed(); }
function touchMoved()   { return mouseDragged(); }
function touchEnded()   { return mouseReleased(); }

function keyPressed() {
  if (key === '1') currentTool = 'square';
  else if (key === '2') currentTool = 'circle';
  else if (key === '3') currentTool = 'triangle';
  else if (key === 'f' || key === 'F') faceMode = !faceMode;
  else if (key === 'c' || key === 'C') shapes = [];
  else if (key === 'z' || key === 'Z') shapes.pop();
}
</script>
</body>
</html>
